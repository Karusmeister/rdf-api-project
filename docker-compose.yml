services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rdf
      POSTGRES_PASSWORD: rdf_dev
      POSTGRES_DB: rdf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdf -d rdf"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-pipeline:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: rdf
      POSTGRES_PASSWORD: rdf_dev
      POSTGRES_DB: pipeline
    volumes:
      - pgdata_pipeline:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdf -d pipeline"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  pgdata_pipeline:
